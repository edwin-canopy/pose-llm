# Pose tokenizer settings consumed by inference/decode_pose.py.
# `package` selects which tokenizer to use; the matching weights path comes from
# dir.toml (xabi_tokenizer_path / james_tokenizer_path) via paths.py.
# `n_codebooks` is the only field that overrides the checkpoint's baked-in
# config; everything else comes from the checkpoint's config.json.

# note xabi tokenizer used in pose somfs dataset
package: xabi              # "james" or "xabi"

n_codebooks: 8              # null = use all codebooks from the checkpoint; otherwise clamp to first N (must be <= checkpoint n_codebooks)

inference_outputs_dir: "/home/edwin/pose-llm/inference_outputs"
device: auto                # "auto" -> cuda if available else cpu

gif:
  fps: 25
  canvas: 512
  dot_radius: 3
  padding: 16
